<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="section-container" id="signin-section">
        <h2>Sign In</h2>
        <input id="signin-email" type="text" placeholder="Email">
        <input id="signin-password" type="password" placeholder="Password">
        <br>
        <button type="button" id="signin-btn" onclick="signinRequest()">Sign In</button>
        <span class="toggle-link" onclick="toggleAuth()">Don't have an account? Sign Up</span>
        <div id="signin-output"></div> 
    </div>

    <div class="section-container hidden" id="signup-section">
        <h2>Sign Up</h2>
        <input id="signup-name" type="text" placeholder="Full Name">
        <input id="signup-email" type="text" placeholder="Email">
        <input id="signup-password" type="password" placeholder="Password">
        <br>
        <button type="button" id="signup-btn" onclick="signupRequest()">Sign Up</button>
        <span class="toggle-link" onclick="toggleAuth()">Already have an account? Sign In</span>
        <div id="signup-output"></div> 
    </div>

    <script src="custom-alert.js"></script>
    <script src="script.js"></script>
</body>
</html>
